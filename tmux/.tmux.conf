# Use tmux-256color for better terminfo/extkey support
set -g default-terminal "tmux-256color"

# Extended keys scoped to xterm-compatible terminals
set -g extended-keys on
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features 'xterm*:extkeys'

# Get links working
set -ga terminal-features "*:hyperlinks"

# Change prefix to Ctrl+A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Set base index to 1
set -g base-index 1

# Avoid ESC delay (reduced for nvim)
set -sg escape-time 10

# Enable vi-style keys
set-window-option -g mode-keys vi

# Enable vim-like movement between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use the mouse for scrolling rather than as arrow up / down
set -g mouse on

# Status bar
set -g status-style 'bg=cyan fg=black'
set -g status-left ''
set -g status-right '%Y-%m-%d %H:%M '

# Enable focus events for nvim
set -g focus-events on

# Reload configuration silently
bind r source-file ~/.tmux.conf
